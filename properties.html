<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Properties - Mikel Marvel Realty</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background-color: #FAF8F5; color: #1A1A1A; }
        h1, h2, h3, h4, h5, h6 { font-family: 'Playfair Display', serif; }
        .bg-gold { background-color: #C6A55C; }
        .text-gold { color: #C6A55C; }
        .bg-charcoal { background-color: #1A1A1A; }
        .hover-lift { transition: all 0.3s ease; }
        .hover-lift:hover { transform: translateY(-5px); box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="bg-[#0D0D0D] text-white sticky top-0 z-50 shadow-lg">
    <div class="max-w-7xl mx-auto px-4">
        <div class="flex justify-between items-center h-16">
            <a href="index.html" class="flex flex-col">
                <span class="text-xl font-bold tracking-wide">MIKEL <span class="text-gold">MARVEL</span></span>
                <span class="text-[10px] text-gray-400 tracking-wider -mt-1">REALTY</span>
            </a>
            <div class="hidden md:flex items-center space-x-6">
                <a href="index.html" class="text-sm hover:text-gold transition">Home</a>
                <a href="properties.html" class="text-sm text-gold transition">Properties</a>
                <a href="about.html" class="text-sm hover:text-gold transition">About</a>
                <a href="contact.html" class="text-sm hover:text-gold transition">Contact</a>
                <a href="https://wa.me/2349071049271" target="_blank" class="bg-gold text-[#0D0D0D] px-5 py-1.5 rounded-full text-sm font-semibold hover:bg-[#D4B86A] transition">Book Inspection</a>
            </div>
        </div>
    </div>
</nav>

<!-- Page Header -->
<section class="bg-charcoal text-white py-16">
    <div class="max-w-7xl mx-auto px-4 text-center">
        <h1 class="text-4xl md:text-5xl font-bold mb-4">Our Properties</h1>
        <p class="text-gray-300 text-lg">Discover luxury homes, prime land, and commercial spaces across Nigeria</p>
    </div>
</section>

<!-- Filters -->
<section class="py-8 bg-white shadow-md sticky top-16 z-40">
    <div class="max-w-7xl mx-auto px-4">
        <div class="flex flex-wrap gap-4">
            <select id="typeFilter" class="px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-gold">
                <option value="all">All Types</option>
                <option value="Land">Land</option>
                <option value="House">House</option>
                <option value="Apartment">Apartment</option>
            </select>
            <select id="locationFilter" class="px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-gold">
                <option value="all">All Locations</option>
                <option value="Lagos">Lagos</option>
                <option value="Abuja">Abuja</option>
            </select>
            <select id="priceFilter" class="px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-gold">
                <option value="all">All Prices</option>
                <option value="0-100000000">₦0 - ₦100M</option>
                <option value="100000000-500000000">₦100M - ₦500M</option>
                <option value="500000000+">₦500M+</option>
            </select>
            <input type="text" id="searchInput" placeholder="Search by title or location..." class="flex-1 px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-gold">
            <button onclick="resetFilters()" class="px-6 py-2 bg-gray-200 rounded-lg hover:bg-gray-300 transition">Reset</button>
        </div>
    </div>
</section>

<!-- Properties Grid -->
<section class="py-16 bg-cream">
    <div class="max-w-7xl mx-auto px-4">
        <div id="propertiesGrid" class="grid md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
        <div id="noResults" class="text-center py-12 hidden">
            <p class="text-gray-500 text-lg">No properties found matching your criteria.</p>
        </div>
    </div>
</section>

<!-- Floating WhatsApp -->
<a href="https://wa.me/2349071049271" target="_blank" class="fixed bottom-6 right-6 z-50 bg-green-500 text-white p-4 rounded-full shadow-lg hover:bg-green-600 transition hover:scale-110 duration-300">
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
</a>

<script>
    const properties = [
        { id: 1, title: 'Luxury 5-Bedroom Mansion', location: 'Banana Island, Lagos', price: 850000000, type: 'House', beds: 5, baths: 6, sqm: 750, image: 'https://images.unsplash.com/photo-1613490493576-7fde63acd811?w=600', status: 'available' },
        { id: 2, title: 'Prime Commercial Land', location: 'Victoria Island, Lagos', price: 350000000, type: 'Land', beds: 0, baths: 0, sqm: 1500, image: 'https://images.unsplash.com/photo-1500382017468-9049fed747ef?w=600', status: 'available' },
        { id: 3, title: 'Modern 3-Bedroom Apartment', location: 'Maitama, Abuja', price: 120000000, type: 'Apartment', beds: 3, baths: 3, sqm: 180, image: 'https://images.unsplash.com/photo-1600607687939-ce8a6c25118c?w=600', status: 'available' },
        { id: 4, title: '4 Bedroom Duplex', location: 'Ajah, Lagos', price: 85000000, type: 'House', beds: 4, baths: 4, sqm: 320, image: 'https://images.unsplash.com/photo-1600585154340-be6161a56a0c?w=600', status: 'available' },
        { id: 5, title: '2 Plots of Land', location: 'Ibeju-Lekki, Lagos', price: 18000000, type: 'Land', beds: 0, baths: 0, sqm: 1000, image: 'https://images.unsplash.com/photo-1506377247377-2a5b3b417bb3?w=600', status: 'available' },
        { id: 6, title: 'Luxury Penthouse', location: 'Lekki Phase 1, Lagos', price: 250000000, type: 'Apartment', beds: 4, baths: 4, sqm: 280, image: 'https://images.unsplash.com/photo-1600566753086-00f18fb6b3ea?w=600', status: 'available' }
    ];

    function formatPrice(price) {
        return new Intl.NumberFormat('en-NG', { style: 'currency', currency: 'NGN', minimumFractionDigits: 0 }).format(price);
    }

    function renderProperties() {
        const typeFilter = document.getElementById('typeFilter').value;
        const locationFilter = document.getElementById('locationFilter').value;
        const priceFilter = document.getElementById('priceFilter').value;
        const searchTerm = document.getElementById('searchInput').value.toLowerCase();

        const filtered = properties.filter(prop => {
            if (typeFilter !== 'all' && prop.type !== typeFilter) return false;
            if (locationFilter !== 'all' && !prop.location.includes(locationFilter)) return false;
            if (priceFilter !== 'all') {
                if (priceFilter === '0-100000000' && prop.price > 100000000) return false;
                if (priceFilter === '100000000-500000000' && (prop.price < 100000000 || prop.price > 500000000)) return false;
                if (priceFilter === '500000000+' && prop.price < 500000000) return false;
            }
            if (searchTerm && !prop.title.toLowerCase().includes(searchTerm) && !prop.location.toLowerCase().includes(searchTerm)) return false;
            return true;
        });

        const grid = document.getElementById('propertiesGrid');
        const noResults = document.getElementById('noResults');

        if (filtered.length === 0) {
            grid.innerHTML = '';
            noResults.classList.remove('hidden');
            return;
        }

        noResults.classList.add('hidden');
        grid.innerHTML = filtered.map(prop => `
            <div class="bg-white rounded-2xl overflow-hidden shadow-lg hover-lift">
                <div class="relative h-64">
                    <img src="${prop.image}" alt="${prop.title}" class="w-full h-full object-cover">
                    <div class="absolute top-4 left-4 bg-gold text-black px-2 py-1 rounded text-xs font-semibold">${prop.type}</div>
                    <div class="absolute top-4 right-4 bg-green-500 text-white px-2 py-1 rounded text-xs font-semibold">Available</div>
                </div>
                <div class="p-5">
                    <div class="text-2xl font-bold text-gold mb-2">${formatPrice(prop.price)}</div>
                    <h3 class="font-bold text-xl mb-2">${prop.title}</h3>
                    <p class="text-gray-500 text-sm mb-4 flex items-center gap-1">📍 ${prop.location}</p>
                    <div class="flex items-center gap-4 mb-4 text-gray-600 text-sm">
                        ${prop.beds > 0 ? `<div class="flex items-center gap-1">🛏️ ${prop.beds} beds</div>` : ''}
                        ${prop.baths > 0 ? `<div class="flex items-center gap-1">🛁 ${prop.baths} baths</div>` : ''}
                        <div class="flex items-center gap-1">📐 ${prop.sqm} sqm</div>
                    </div>
                    <a href="https://wa.me/2349071049271?text=Hello%2C%20I'm%20interested%20in%20${encodeURIComponent(prop.title)}%20located%20at%20${encodeURIComponent(prop.location)}%20priced%20at%20${formatPrice(prop.price)}" target="_blank" class="block bg-charcoal text-white text-center py-2 rounded-lg font-semibold hover:bg-charcoal/90 transition">
                        Inquire on WhatsApp
                    </a>
                </div>
            </div>
        `).join('');
    }

    function resetFilters() {
        document.getElementById('typeFilter').value = 'all';
        document.getElementById('locationFilter').value = 'all';
        document.getElementById('priceFilter').value = 'all';
        document.getElementById('searchInput').value = '';
        renderProperties();
    }

    document.getElementById('typeFilter').addEventListener('change', renderProperties);
    document.getElementById('locationFilter').addEventListener('change', renderProperties);
    document.getElementById('priceFilter').addEventListener('change', renderProperties);
    document.getElementById('searchInput').addEventListener('input', renderProperties);

    renderProperties();
</script>
</body>
</html>
